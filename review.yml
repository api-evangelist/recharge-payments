sources:
  - url: https://developer.rechargepayments.com/2021-11
    type: Documentation
    note: API introduction - base URL api.rechargeapps.com, token auth, versioning. All REST. No WebSocket mentioned.
  - url: https://developer.rechargepayments.com/2021-11/subscriptions
    type: APIReference
    note: Subscription CRUD plus lifecycle action endpoints (cancel, activate, change_next_charge_date).
  - url: https://developer.rechargepayments.com/2021-11/webhooks_endpoints
    type: APIReference
    note: Webhook endpoint CRUD and test - outbound HTTPS POST notifications, not a socket.
  - url: https://docs.getrecharge.com/docs/endpoints
    type: Documentation
    note: Full resource list - Addresses, Charges, Checkouts, Customers, Discounts, Metafields, Onetimes, Orders, Payments, Products, Subscriptions, Webhooks, Async batches.
  - url: https://docs.getrecharge.com/docs/api-rate-limits
    type: Documentation
    note: Leaky-bucket rate limiter - bucket of 40, leaking 2 requests/second; 429 on overflow.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Recharge's public API is
    request/response REST plus outbound webhooks. No AsyncAPI document was
    created because there is no server-push socket transport on Recharge's own
    API to model; webhook delivery is already represented as the Webhooks REST
    API in apis.yml.
