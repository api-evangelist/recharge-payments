aid: recharge-payments
name: Recharge
review:
  question: Does Recharge expose a documented public WebSocket API?
  answer: false
  date: '2026-07-10'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Recharge's entire documented public
    surface is request/response REST over HTTPS at https://api.rechargeapps.com,
    plus outbound webhooks (server-to-endpoint HTTPS POST). There is no
    server-push transport (WebSocket or SSE) on Recharge's own API to model.
    Recharge's near-real-time notifications are delivered by POSTing event
    payloads to merchant-registered webhook endpoints; those are one-directional
    HTTP callbacks, not a persistent socket, and are already represented as the
    Webhooks API rather than as an AsyncAPI channel.
findings:
  summary: |
    Recharge does not publish a documented public WebSocket API. Recharge
    (Recharge Payments) is a subscription and recurring-billing platform for
    e-commerce. Its public API is a versioned REST API at
    https://api.rechargeapps.com, authenticated with a store API token in the
    X-Recharge-Access-Token header and versioned with the X-Recharge-Version
    header (supported versions 2021-11 and 2021-01). Every documented resource -
    subscriptions, customers, addresses, charges, orders, products, payment
    methods, onetimes, discounts, checkouts, metafields, and webhook endpoints -
    is accessed via standard HTTP verbs returning JSON. Event delivery is handled
    by outbound webhooks that POST to a merchant-registered URL. No realtime,
    bidirectional, or streaming WebSocket (ws:// or wss://) endpoint is documented
    anywhere in Recharge's developer reference as of the review date.
  accessModel: |
    Access to the Recharge API requires a Recharge merchant account (typically
    connected to a Shopify, BigCommerce, or custom store). API tokens are
    generated per store in the merchant portal under Apps and integrations, and
    scoped to specific resource permissions. Partner/public apps use OAuth to
    obtain per-store tokens. The API is not an open, anonymous API - a paid
    Recharge plan and a store token are required - but the reference
    documentation is fully public.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.rechargeapps.com
      documented: true
      note: The complete public API. Token auth via X-Recharge-Access-Token; version via X-Recharge-Version.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Outbound event notifications POSTed to a merchant-registered endpoint. One-directional HTTP callback, not a socket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Recharge developer reference as of the review date.
  endpointsConfirmedRest:
