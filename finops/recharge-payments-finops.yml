meters:
- name: monthly_platform_fee
  description: Fixed monthly Recharge plan fee (Starter, Plus, or Custom).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: transaction_fee
  description: Per-subscription-order fee (percentage of order value plus fixed per-order amount).
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - plan
- name: sms_usage
  description: Concierge SMS messages sent on higher tiers, billed per message.
  unit: messages
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track processed subscription order volume and its per-order transaction fees separately from the fixed monthly platform fee, and separately from underlying gateway processing fees.
- name: Allocation
  description: Map transaction fees to store, product line, or subscription cohort so recurring-revenue cost of processing is attributable.
- name: Optimization
  description: Reduce churn and failed-payment retries to keep processed-order fees productive; evaluate tier upgrades where percentage rate reductions offset the higher monthly fee at your order volume.
- name: Accountability
  description: Assign an owner for the Recharge plan tier decision and review monthly platform-fee plus transaction-fee spend against subscription revenue each billing cycle.
