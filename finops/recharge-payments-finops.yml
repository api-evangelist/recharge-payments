description: >-
  FinOps view of Recharge spend. Recharge bills merchants as a SaaS subscription:
  a fixed monthly platform fee per plan tier (Starter, Plus, Custom) plus a
  per-transaction fee on each subscription order processed (a percentage of order
  value plus a fixed per-order amount). The REST API carries no separate metered
  charge - API usage is included with a paid plan - so API cost is effectively
  bundled into the platform fee, while the variable cost driver is the volume of
  processed subscription orders. Underlying payment-gateway processing fees are
  billed separately by the gateway and are out of scope here.
notes: >-
  Per-unit rates (monthly fee, transaction percentage, per-order fixed fee) are
  set by plan tier and should be verified on the Recharge pricing page during
  reconciliation. The dominant, most controllable cost is the per-order
  transaction fee, which scales directly with processed subscription order volume.
